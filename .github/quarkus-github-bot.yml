---
# The format of this file is documented here:
# https://github.com/quarkusio/quarkus-bot#triage-issues
features: [ANALYZE_WORKFLOW_RUN_RESULTS, ADD_BRANCH_TO_PULL_REQUEST_TITLE, PULL_REQUEST_GUARDED_BRANCHES]
workflowRunAnalysis:
  workflows: ["CI Build"]
triage:
  guardedBranches:
    - ref: '3.33'
      notify: [jmartisk, gsmet, gastaldi, rsvoboda, aloubyansky]
    - ref: '3.27'
      notify: [jmartisk, gsmet, gastaldi, rsvoboda, aloubyansky]
    - ref: '3.20'
      notify: [jmartisk, gsmet, gastaldi, rsvoboda, aloubyansky]
    - ref: '3.15'
      notify: [jmartisk, gsmet, gastaldi, rsvoboda, aloubyansky]
    - ref: '3.8'
      notify: [jmartisk, gsmet, gastaldi, rsvoboda, aloubyansky]
